              "Wln_Enhancement_tests3": ["WL_DNet_Next_WlnEnhancementsTests3_Next"],
              "Wln_Enhancement_tests_indigo": ["WL_DNet_Edge_WlnEnhancementsTests_Indigo_Edge"],
          }

          def resolve_suites(impact, fm):
              test_categories = set()
              reasons         = []
              change_type = impact.get("change_type", "chore")
              risk_level  = impact.get("risk_level",  "low")
              modules     = impact.get("modules_affected", [])
              file_paths  = impact.get("file_paths", [])
              title       = impact.get("pr_title", "")

              fm_modules   = fm.get("modules")            or {}
              fm_sub_paths = fm.get("sub_paths")          or {}
              fm_keywords  = fm.get("keywords")           or {}
              fm_ct_rules  = fm.get("change_type_rules")  or {}
              fm_high_risk = fm.get("high_risk_always_add") or {}

              ct_rule = fm_ct_rules.get(change_type, {})
              if ct_rule.get("skip_all"):
                  return _build(impact, set(), True, f"change_type={change_type} => skip_all")
              if ct_rule.get("test_categories_override"):
                  test_categories.update(ct_rule["test_categories_override"])
                  return _build(impact, test_categories, False,
                                f"change_type={change_type} override applied")

              for module in modules:
                  entry = fm_modules.get(module)
                  if entry:
                      cats = entry.get("test_categories", [])
                      if cats:
                          test_categories.update(cats)
                          reasons.append(f"module:{module}")
                      if ct_rule.get("skip_integration"):
                          test_categories = {c for c in test_categories if "Smoke" not in c}

              for fp in file_paths:
                  for prefix, entry in fm_sub_paths.items():
                      if fp.startswith(prefix):
                          cats = entry.get("test_categories", [])
                          if cats:
                              test_categories.update(cats)
                              reasons.append(f"sub_path:{prefix}")

              text = title.lower()
              for keyword, entry in fm_keywords.items():
                  if keyword.lower() in text:
                      cats = entry.get("test_categories", [])
                      if cats:
                          test_categories.update(cats)
                          reasons.append(f"keyword:{keyword}")

              if risk_level == "high" and fm_high_risk:
                  cats = fm_high_risk.get("test_categories", [])
                  if cats:
                      test_categories.update(cats)
                      reasons.append("high_risk_escalation")

              if not test_categories:
                  test_categories.update(["CoreSearch", "EdgeSmokeFeatures"])
                  reasons.append("fallback:smoke_only")

              return _build(impact, test_categories, False, " | ".join(dict.fromkeys(reasons)))

          def _build(impact, test_categories, skip_all, reason):
              workflows = []
              for cat in sorted(test_categories):
                  for wf in CAT_TO_WORKFLOW.get(cat, []):
                      if wf not in workflows:
                          workflows.append(wf)
              if not skip_all and not workflows:
                  workflows = ["WL_DNet_Edge_CoreSearch", "WL_DNet_Edge_Smoke_Features"]
              return {
                  "pr_number":        impact.get("pr_number"),
                  "pr_title":         impact.get("pr_title"),
                  "pr_url":           impact.get("pr_url"),
                  "head_sha":         impact.get("head_sha"),
                  "risk_level":       impact.get("risk_level"),
                  "change_type":      impact.get("change_type"),
                  "modules":          impact.get("modules_affected", []),
                  "products":         impact.get("all_products", []),
                  "test_categories":  sorted(test_categories),
                  "dotnet_workflows": sorted(set(workflows)),
                  "skip_all":         skip_all,
                  "reason":           reason,
              }

          # --- Feature-map cache (load each YAML once, shared across all PRs) ---
          _fm_cache = {}
          def load_fm(fm_local):
              key = fm_local or "config/feature-map.yml"
              if key not in _fm_cache:
                  p = Path(key)
                  if not p.exists():
                      p = Path("config/feature-map.yml")
                  _fm_cache[key] = yaml.safe_load(p.read_text()) if p.exists() else {}
              return _fm_cache[key]

          # --- Single-pass loop: read impact → resolve → write plan ---
          prs       = json.loads(Path("state/prs_discovered.json").read_text())
          plans_dir = Path("state/test_plans")
          plans_dir.mkdir(parents=True, exist_ok=True)
          all_wf     = set()
          plan_count = 0

          for pr_info in prs:
              pr_num    = pr_info["number"]
              repo_name = pr_info.get("repo_name", "cobalt_search")
              fm_local  = pr_info.get("feature_map_local", "config/feature-map.yml")
              pr_key    = f"{repo_name}_{pr_num}"

              impact_file = Path(f"state/{repo_name}/pr_impacts/pr_{pr_num}.json")
              plan_file   = plans_dir / f"{pr_key}.json"

              if not impact_file.exists():
                  print(f"  SKIP {repo_name} PR #{pr_num}: no impact file", file=sys.stderr)
                  continue

              impact = json.loads(impact_file.read_text())
              fm     = load_fm(fm_local)
              plan   = resolve_suites(impact, fm)

              plan_file.write_text(json.dumps(plan, indent=2))
              if not plan.get("skip_all"):
                  all_wf.update(plan.get("dotnet_workflows", []))
              plan_count += 1
              print(f"  {repo_name} PR #{pr_num}: "
                    f"{len(plan.get('dotnet_workflows',[]))} workflow(s) "
                    f"[{plan.get('risk_level','?').upper()}]")

          Path("state/all_impacted_workflows.json").write_text(json.dumps(sorted(all_wf), indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"plan_count={plan_count}\n")
              f.write(f"workflow_count={len(all_wf)}\n")

          print(f"\nPlans built: {plan_count}  Unique workflows: {len(all_wf)}")
          for wf in sorted(all_wf):
              print(f"  -> {wf}.yml")
          EOF

      # ── Step 5: Build per-file impact details (per-repo feature-map) ─────────
      - name: Build per-file impact details
        if: steps.discover.outputs.pr_count != '0'
        run: |
          python3 - <<'EOF'
          import json, yaml, sys
          from pathlib import Path

          _fm_cache = {}

          def load_fm(path):
              if path not in _fm_cache:
                  p = Path(path)
                  if not p.exists():
                      p = Path("config/feature-map.yml")
                  _fm_cache[path] = yaml.safe_load(p.read_text())
              return _fm_cache[path]

          def classify_file(filepath, fm):
              fm_modules   = (fm.get("modules") or {})
              fm_sub_paths = (fm.get("sub_paths") or {})
              best_prefix  = None
              best_entry   = None
              for prefix, entry in fm_sub_paths.items():
                  if filepath.startswith(prefix):
                      if best_prefix is None or len(prefix) > len(best_prefix):
                          best_prefix = prefix
                          best_entry  = entry
              if best_entry:
                  return {"matched_by": "sub_path", "match_key": best_prefix,
                          "categories": best_entry.get("test_categories", []), "risk": "medium"}
              for mod_name, mod_entry in fm_modules.items():
                  if filepath.startswith(mod_name + "/"):
                      return {"matched_by": "module", "match_key": mod_name,
                              "categories": mod_entry.get("test_categories", []),
                              "risk": mod_entry.get("risk_multiplier", "low")}
              fp_lower = filepath.lower()
              if ("/test/" in fp_lower or "/tests/" in fp_lower or
                      fp_lower.endswith("test.java") or fp_lower.endswith("tests.java") or
                      fp_lower.endswith("test.groovy") or fp_lower.endswith("test.cs")):
                  return {"matched_by": "test_file", "match_key": None,
                          "categories": [], "risk": "low"}
              return {"matched_by": "none", "match_key": None, "categories": [], "risk": "low"}

          prs    = json.loads(Path("state/prs_discovered.json").read_text())
          report = {}

          for pr_info in prs:
              pr_num    = pr_info["number"]
              repo_name = pr_info.get("repo_name", "cobalt_search")
              fm_local  = pr_info.get("feature_map_local", "config/feature-map.yml")
              pr_key    = f"{repo_name}_{pr_num}"

              impact_file = Path(f"state/{repo_name}/pr_impacts/pr_{pr_num}.json")
              if not impact_file.exists():
                  continue

              fm         = load_fm(fm_local or "config/feature-map.yml")
              impact     = json.loads(impact_file.read_text())
              file_paths = impact.get("file_paths", [])
              files      = [{"filename": fp, **classify_file(fp, fm)} for fp in file_paths]

              report[pr_key] = {
                  "repo_name": repo_name,
                  "pr_number": pr_num,
                  "pr_title":  pr_info.get("title", ""),
                  "pr_title":  pr_info.get("title", ""),
                  "pr_url":    pr_info.get("html_url", ""),
                  "files":     files,
              }
              matched = sum(1 for f in files if f["matched_by"] != "none")
              print(f"  {repo_name} PR #{pr_num}: {len(files)} file(s), {matched} mapped")

          Path("state/per_file_impacts.json").write_text(json.dumps(report, indent=2))
          print(f"Wrote state/per_file_impacts.json ({len(report)} PR(s))")
          EOF

      # ── Step 6: Dispatch selective-regression.yml for each PR ───────────────
      - name: Dispatch selective regression
        if: steps.discover.outputs.pr_count != '0'
        env:
          GH_TOKEN: ${{ secrets.REGRESSION_TRIGGER_PAT }}
          REPO:     tr/CobaltRegressionTesting
          TEST_ENV: ${{ inputs.env }}
          DRY_RUN:  ${{ inputs.dry_run }}
        run: |
          python3 - <<'EOF'
          import json, os, subprocess, sys
          from pathlib import Path

          repo     = os.environ["REPO"]
          test_env = os.environ.get("TEST_ENV", "Demo")
          dry_run  = os.environ.get("DRY_RUN", "false").lower() == "true"
          prs      = json.loads(Path("state/prs_discovered.json").read_text())
          gh       = "gh"

          if dry_run:
              print("DRY RUN — analysis complete, regression workflows will NOT be triggered.")

          # Map our UI values to the uppercase values the target workflow expects
          ENV_MAP = {
              "Demo":   "DEMO",
              "QED":    "QED",
              "QEDAWS": "QEDAWS",
          }
          dispatch_env = ENV_MAP.get(test_env, test_env.upper())

          dispatched = 0
          skipped    = 0
          failed     = 0

          for pr_info in prs:
              pr_num    = pr_info["number"]
              repo_name = pr_info.get("repo_name", "cobalt_search")
              pr_key    = f"{repo_name}_{pr_num}"
              plan_file = Path(f"state/test_plans/{pr_key}.json")

              if not plan_file.exists():
                  print(f"  SKIP PR #{pr_num}: no test plan generated", file=sys.stderr)
                  skipped += 1
                  continue

              plan = json.loads(plan_file.read_text())

              if plan.get("skip_all"):
                  print(f"  SKIP {repo_name} PR #{pr_num}: skip_all=true ({plan.get('reason','')})")
                  skipped += 1
                  continue

              workflows = plan.get("dotnet_workflows", [])
              if not workflows:
                  print(f"  SKIP {repo_name} PR #{pr_num}: no workflows mapped", file=sys.stderr)
                  skipped += 1
                  continue

              if dry_run:
                  print(f"  DRY  {repo_name} PR #{pr_num}: would dispatch {len(workflows)} workflow(s) [{dispatch_env}]")
                  dispatched += 1
                  continue

              cmd = [
                  gh, "workflow", "run", "selective-regression.yml",
                  "--repo", repo,
                  "-f", f"pr_number={pr_num}",
                  "-f", f"pr_title={pr_info.get('title','')[:80]}",
                  "-f", f"pr_url={pr_info.get('html_url','')}",
                  "-f", f"head_sha={pr_info.get('head_sha','')}",
                  "-f", f"risk_level={plan.get('risk_level','low')}",
                  "-f", f"modules={','.join(plan.get('modules',[]))}",
                  "-f", f"products={','.join(plan.get('products',[]))}",
                  "-f", f"dotnet_workflows={','.join(workflows)}",
                  "-f", f"TEST_ENVIRONMENT={dispatch_env}",
              ]
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"  OK  {repo_name} PR #{pr_num}: dispatched {len(workflows)} workflow(s) [{dispatch_env}]")
                  dispatched += 1
              else:
                  print(f"  FAIL {repo_name} PR #{pr_num}: {result.stderr.strip()}", file=sys.stderr)
                  failed += 1

          if dry_run:
              print(f"\nDRY RUN — {dispatched} workflow(s) analysed, none triggered.")
          else:
              print(f"\nDispatched: {dispatched}  Skipped: {skipped}  Failed: {failed}")
          if failed > 0:
              sys.exit(1)
          EOF

      # ── Step 7: Write job summary ────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          PR_NUMBERS: ${{ inputs.pr_numbers }}
          HOURS_BACK: ${{ inputs.hours_back }}
          DATE_FROM:  ${{ inputs.date_from }}
          DATE_TO:    ${{ inputs.date_to }}
          STATE:      ${{ inputs.state }}
          ENV_INPUT:  ${{ inputs.env }}
          DRY_RUN:    ${{ inputs.dry_run }}
          PR_COUNT:   ${{ steps.discover.outputs.pr_count    || '0' }}
          WF_COUNT:   ${{ steps.map.outputs.workflow_count   || '0' }}
          PLAN_COUNT: ${{ steps.map.outputs.plan_count       || '0' }}
        run: |
          python3 - <<'EOF'
          import json, os
          from pathlib import Path

          pr_numbers = os.environ.get("PR_NUMBERS", "")
          hours_back = os.environ.get("HOURS_BACK", "")
          date_from  = os.environ.get("DATE_FROM", "")
          date_to    = os.environ.get("DATE_TO", "")
          state      = os.environ.get("STATE", "merged")
          env_input  = os.environ.get("ENV_INPUT", "Demo")
          dry_run    = os.environ.get("DRY_RUN", "false").lower() == "true"
          pr_count   = int(os.environ.get("PR_COUNT", "0"))
          wf_count   = int(os.environ.get("WF_COUNT", "0"))
          plan_count = int(os.environ.get("PLAN_COUNT", "0"))

          if pr_numbers:
              mode = f"Explicit PR numbers: `{pr_numbers}`"
          elif hours_back:
              mode = f"Last `{hours_back}` hours (rolling UTC window) · state=`merged`"
          else:
              mode = f"Date range: `{date_from or '*'}` → `{date_to or 'now'}` · state=`{state}`"

          RISK_BADGE = {"high": "🔴 high", "medium": "🟡 medium", "low": "🟢 low"}

          wf_display = f"{wf_count} (dry run)" if dry_run else str(wf_count)

          lines = [
              "## Run Selective Regression — Manual Dispatch",
              "",
          ]
          if dry_run:
              lines += [
                  "> [!NOTE]",
                  "> **DRY RUN** — Analysis completed. No regression workflows were triggered.",
                  "",
              ]
          lines += [
              "| Field | Value |",
              "|---|---|",
              f"| Mode | {mode} |",
              f"| Environment | **{env_input}** |",
              f"| PRs discovered | {pr_count} |",
              f"| Test plans built | {plan_count} |",
              f"| Unique workflows dispatched | {wf_display} |",
              "",
          ]

          if pr_count == 0:
              lines += ["### No PRs found matching the given criteria.", ""]
          else:
              prs_file     = Path("state/prs_discovered.json")
              impacts_file = Path("state/per_file_impacts.json")

              prs     = json.loads(prs_file.read_text())    if prs_file.exists()     else []
              impacts = json.loads(impacts_file.read_text()) if impacts_file.exists() else {}

              # ── PR overview table ─────────────────────────────────────────────
              lines += ["### PRs Processed", "",
                         "| Repository | PR | State | Created | Title |",
                         "|---|---|---|---|---|"]
              for pr in prs:
                  num       = pr["number"]
                  url       = pr.get("html_url", "")
                  title     = pr.get("title", "")[:55]
                  s         = pr.get("state", "?")
                  created   = (pr.get("created_at") or "")[:10]
                  merged    = " ✓" if pr.get("merged_at") else ""
                  repo_name = pr.get("repo_name", "cobalt_search")
                  lines.append(f"| `{repo_name}` | [#{num}]({url}) | {s}{merged} | {created} | {title} |")
              lines.append("")

              # ── Per-PR file impact breakdown ──────────────────────────────────
              lines += ["---", "", "## PR File Impact Details", ""]

              for pr in prs:
                  num       = pr["number"]
                  url       = pr.get("html_url", "")
                  title     = pr.get("title", "")
                  repo_name = pr.get("repo_name", "cobalt_search")
                  pr_key    = f"{repo_name}_{num}"

                  lines += [f"### [{repo_name} — PR #{num}]({url})", f"> {title}", ""]

                  pr_files = impacts.get(pr_key, {}).get("files", [])

                  if pr_files:
                      lines += [
                          "| File | Matched By | Module / Path | Risk | Test Categories |",
                          "|------|------------|---------------|------|-----------------|",
                      ]
                      for f in pr_files:
                          fname = f["filename"]
                          m_by  = f.get("matched_by", "none")
                          m_key = f.get("match_key") or "—"
                          risk  = f.get("risk", "low")
                          cats  = f.get("categories", [])

                          disp_name = fname if len(fname) <= 65 else "…" + fname[-62:]
                          disp_key  = m_key if len(m_key) <= 45 else "…" + m_key[-42:]

                          if cats:
                              shown    = cats[:3]
                              overflow = len(cats) - 3
                              cats_str = ", ".join(shown) + (f" +{overflow}" if overflow > 0 else "")
                          else:
                              cats_str = "—"

                          lines.append(
                              f"| `{disp_name}` | {m_by} | `{disp_key}` "
                              f"| {RISK_BADGE.get(risk, risk)} | {cats_str} |"
                          )
                      lines.append("")
                  else:
                      lines += ["*No changed files recorded.*", ""]

                  # Per-PR summary from test plan
                  plan_file = Path(f"state/test_plans/{pr_key}.json")
                  if plan_file.exists():
                      plan   = json.loads(plan_file.read_text())
                      cats   = plan.get("test_categories", [])
                      risk   = plan.get("risk_level", "")
                      reason = plan.get("reason", "")
                      if cats:
                          lines += [
                              f"**Risk level:** {RISK_BADGE.get(risk, risk or '—')} &nbsp;|&nbsp; "
                              f"**Test categories ({len(cats)}):** {', '.join(cats)}",
                              "",
                          ]
                      if reason:
                          lines += [f"*{reason}*", ""]

              # ── Dispatched workflows ──────────────────────────────────────────
              wf_json = Path("state/all_impacted_workflows.json")
              if wf_json.exists():
                  all_wf = json.loads(wf_json.read_text())
                  if all_wf:
                      lines += ["---", "", "### Workflows Dispatched", "",
                                 "| Workflow | Target Repo |",
                                 "|---|---|"]
                      for wf in all_wf:
                          lines.append(
                              f"| `{wf}.yml` | `tr/CobaltRegressionTesting` |"
                          )
                      lines.append("")

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "summary.md"), "a") as f:
              f.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          EOF
